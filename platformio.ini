[platformio]
default_envs = cardputer-adv

[env:cardputer-adv]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    m5stack/M5Unified
    m5stack/M5GFX
    m5stack/M5Cardputer

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
    -<*>
    +<indi/>
    +<mount/>
    +<camera/>
    +<gnss/GnssState.cpp>
    +<app/RuntimeConfig.cpp>
